<!DOCTYPE html>
<html>
<head>
  <title>GARBHA MOTION ANALYSIS PRO FINAL</title>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.13.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body{margin:0; overflow:hidden; background:black;}
    video, canvas{
      position:absolute;
      width:100%;
      height:100%;
      object-fit:contain;
    }
    video{transform:scaleX(-1);}
    #hud{
      position:fixed;
      top:20px; left:20px;
      color:#00ffff;
      font-family:monospace;
      background:rgba(0,0,0,0.4);
      padding:10px;
      border-radius:10px;
    }
    button{
      position:fixed;
      bottom:20px;
      padding:10px 20px;
      background:#00ffff;
      border:none;
      border-radius:8px;
      cursor:pointer;
      z-index:10;
    }
    #startBtn{left:25%;}
    #pdfBtn{left:45%;}
    #shotBtn{left:65%;}
  </style>
</head>

<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
<div id="hud">Loading...</div>

<button id="startBtn">START</button>
<button id="pdfBtn">EXPORT PDF</button>
<button id="shotBtn">SCREENSHOT</button>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const hud = document.getElementById('hud');
const startBtn = document.getElementById('startBtn');
const pdfBtn = document.getElementById('pdfBtn');
const shotBtn = document.getElementById('shotBtn');

let detector;
let records = [];
let lastFrameImage = null;

// ================= CAMERA =================
async function setupCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{width:1280,height:720,facingMode:"user"}
  });
  video.srcObject = stream;
  return new Promise(r=>{
    video.onloadedmetadata=()=>{ video.play(); r(); }
  });
}

// ================= MATH =================
function getAngle(A,B,C){
  const AB = {x:A.x-B.x, y:A.y-B.y};
  const CB = {x:C.x-B.x, y:C.y-B.y};
  const dot = AB.x*CB.x + AB.y*CB.y;
  const magAB = Math.hypot(AB.x,AB.y);
  const magCB = Math.hypot(CB.x,CB.y);
  return Math.acos(dot/(magAB*magCB)) * 180/Math.PI;
}

function getDistance(a,b){
  return Math.hypot(a.x-b.x, a.y-b.y);
}

// ================= DRAW =================
function drawLine(a,b){
  ctx.beginPath();
  ctx.moveTo(canvas.width-a.x,a.y);
  ctx.lineTo(canvas.width-b.x,b.y);
  ctx.strokeStyle="cyan";
  ctx.lineWidth=3;
  ctx.stroke();
}

function drawPoint(p){
  ctx.beginPath();
  ctx.arc(canvas.width-p.x,p.y,5,0,Math.PI*2);
  ctx.fillStyle="blue";
  ctx.fill();
  ctx.strokeStyle="white";
  ctx.stroke();
}

// ================= SCREENSHOT =================
shotBtn.onclick = ()=>{
  if(!lastFrameImage) return alert("Belum ada frame");
  const a = document.createElement("a");
  a.href = lastFrameImage;
  a.download = "garbha_screenshot.jpg";
  a.click();
};

// ================= PDF =================
pdfBtn.onclick = ()=>{
  if(!lastFrameImage) return alert("Belum ada data");

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.text("GARBHA MOTION REPORT", 10, 10);

  let y = 20;
  records.slice(-10).forEach(r=>{
    doc.text(
      `TR:${r.handR} TL:${r.handL} KR:${r.legR} KL:${r.legL}`,
      10, y
    );
    y += 6;
  });

  doc.addImage(lastFrameImage, "JPEG", 10, y+5, 180, 100);
  doc.save("garbha_report.pdf");
};

// ================= MAIN =================
async function main(){

  await setupCamera();

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    {modelType:"SinglePose.Lightning"}
  );

  function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.save();
    ctx.scale(-1,1);
    ctx.drawImage(video,-canvas.width,0,canvas.width,canvas.height);
    ctx.restore();

    detector.estimatePoses(video).then(poses=>{

      if(!poses.length) return;
      const pose = poses[0];

      function P(name){
        return pose.keypoints.find(k=>k.name===name && k.score>0.4);
      }

      const kp = pose.keypoints;

      // skeleton
      const pairs = [
        ["left_shoulder","right_shoulder"],
        ["left_shoulder","left_elbow"],
        ["left_elbow","left_wrist"],
        ["right_shoulder","right_elbow"],
        ["right_elbow","right_wrist"],
        ["left_hip","right_hip"],
        ["left_shoulder","left_hip"],
        ["right_shoulder","right_hip"],
        ["left_hip","left_knee"],
        ["left_knee","left_ankle"],
        ["right_hip","right_knee"],
        ["right_knee","right_ankle"]
      ];

      pairs.forEach(([a,b])=>{
        const p1 = P(a);
        const p2 = P(b);
        if(p1 && p2) drawLine(p1,p2);
      });

      kp.forEach(p=>{
        if(p.score>0.4) drawPoint(p);
      });

      // ambil titik
      const sR=P("right_shoulder"), eR=P("right_elbow"), wR=P("right_wrist");
      const sL=P("left_shoulder"), eL=P("left_elbow"), wL=P("left_wrist");
      const hR=P("right_hip"), kR=P("right_knee"), aR=P("right_ankle");
      const hL=P("left_hip"), kL=P("left_knee"), aL=P("left_ankle");

      // skala cm
      let scale = 1;
      if(sL && sR){
        scale = 40 / getDistance(sL, sR);
      }

      // ukuran
      const handR = eR && wR ? getDistance(eR,wR)*scale : 0;
      const handL = eL && wL ? getDistance(eL,wL)*scale : 0;
      const legR = kR && aR ? getDistance(kR,aR)*scale : 0;
      const legL = kL && aL ? getDistance(kL,aL)*scale : 0;

      const torso = sR && hR ? getDistance(sR,hR)*scale : 0;

      // sudut
      const angleER = sR&&eR&&wR ? getAngle(sR,eR,wR) : 0;
      const angleEL = sL&&eL&&wL ? getAngle(sL,eL,wL) : 0;
      const angleKR = hR&&kR&&aR ? getAngle(hR,kR,aR) : 0;
      const angleKL = hL&&kL&&aL ? getAngle(hL,kL,aL) : 0;

      // kemiringan
      let tilt = 0;
      if(sL && sR){
        tilt = Math.atan2(sR.y - sL.y, sR.x - sL.x) * 180/Math.PI;
      }

      // TEXT DI CANVAS (INI MASUK KE SCREENSHOT 🔥)
      ctx.fillStyle="white";
      ctx.font="14px monospace";

      let y = 20;
      function t(txt){ ctx.fillText(txt,20,y); y+=18;}

      t("=== GARBHA ANALYSIS ===");
      t(`Tangan Kanan: ${handR.toFixed(1)} cm`);
      t(`Tangan Kiri : ${handL.toFixed(1)} cm`);
      t(`Siku Kanan: ${angleER.toFixed(1)}°`);
      t(`Siku Kiri : ${angleEL.toFixed(1)}°`);
      t(`Kaki Kanan: ${legR.toFixed(1)} cm`);
      t(`Kaki Kiri : ${legL.toFixed(1)} cm`);
      t(`Lutut Kanan: ${angleKR.toFixed(1)}°`);
      t(`Lutut Kiri : ${angleKL.toFixed(1)}°`);
      t(`Torso: ${torso.toFixed(1)} cm`);
      t(`Kemiringan: ${tilt.toFixed(1)}°`);

      // simpan data
      records.push({handR,handL,legR,legL});

      // simpan frame
      lastFrameImage = canvas.toDataURL("image/jpeg",0.9);

    });

    requestAnimationFrame(draw);
  }

  draw();
}

startBtn.onclick = ()=>{
  startBtn.style.display="none";
  main();
};
</script>

</body>
</html>
