<!DOCTYPE html>
<html>
<head>
  <title>GARBHA MOTION ANALYSIS PRO MAX</title>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.13.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

  <style>
    body{margin:0; overflow:hidden; background:black;}
    video, canvas{
      position:absolute;
      width:100%;
      height:100%;
      object-fit:contain;
    }
    video{transform:scaleX(-1);}
    #hud{
      position:fixed;
      top:20px; left:20px;
      color:#00ffff;
      font-family:monospace;
      background:rgba(0,0,0,0.4);
      padding:10px;
      border-radius:10px;
    }
    button{
      position:fixed;
      bottom:20px;
      padding:10px 20px;
      background:#00ffff;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }
    #startBtn{left:40%;}
    #exportBtn{left:55%;}
  </style>
</head>

<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
<div id="hud">Loading...</div>
<button id="startBtn">START</button>
<button id="exportBtn">EXPORT</button>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
const startBtn = document.getElementById('startBtn');
const exportBtn = document.getElementById('exportBtn');

let detector;

// ================= STABILIZER =================
let smoothData = {};
let bufferData = {};

function smooth(name, value){
  if(!smoothData[name]) smoothData[name] = value;
  smoothData[name] = smoothData[name]*0.6 + value*0.4;
  return smoothData[name];
}

function buffer(name, value){
  if(!bufferData[name]) bufferData[name] = [];
  bufferData[name].push(value);
  if(bufferData[name].length > 5) bufferData[name].shift();

  let avg = bufferData[name].reduce((a,b)=>a+b,0)/bufferData[name].length;
  return avg;
}

// ================= CAMERA =================
async function setupCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{width:1280,height:720,facingMode:"user"}
  });
  video.srcObject = stream;
  return new Promise(r=>{
    video.onloadedmetadata=()=>{
      video.play();
      r();
    }
  });
}

// ================= MATH =================
function getDistance(a,b){
  return Math.hypot(a.x-b.x, a.y-b.y);
}

function getAngle(A,B,C){
  const AB = {x:A.x-B.x, y:A.y-B.y};
  const CB = {x:C.x-B.x, y:C.y-B.y};

  const dot = AB.x*CB.x + AB.y*CB.y;
  const magAB = Math.hypot(AB.x,AB.y);
  const magCB = Math.hypot(CB.x,CB.y);

  return Math.acos(dot/(magAB*magCB)) * 180/Math.PI;
}

// ================= DRAW =================
function drawLine(a,b){
  ctx.beginPath();
  ctx.moveTo(canvas.width-a.x,a.y);
  ctx.lineTo(canvas.width-b.x,b.y);
  ctx.strokeStyle="cyan";
  ctx.lineWidth=3;
  ctx.stroke();
}

function drawPoint(p){
  ctx.beginPath();
  ctx.arc(canvas.width-p.x,p.y,5,0,Math.PI*2);
  ctx.fillStyle="blue";
  ctx.fill();
  ctx.strokeStyle="white";
  ctx.stroke();
}

// ================= EXPORT =================
let records = [];

function saveData(data){
  records.push(data);
}

exportBtn.onclick = ()=>{
  let csv = "time,elbowR,elbowL,kneeR,kneeL\n";

  records.forEach(r=>{
    csv += `${r.time},${r.elbowR},${r.elbowL},${r.kneeR},${r.kneeL}\n`;
  });

  const blob = new Blob([csv], {type:"text/csv"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "garbha_motion_data.csv";
  a.click();
};

// ================= MAIN =================
async function main(){

  await setupCamera();

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    {modelType:"SinglePose.Lightning"}
  );

  function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.save();
    ctx.scale(-1,1);
    ctx.drawImage(video,-canvas.width,0,canvas.width,canvas.height);
    ctx.restore();

    detector.estimatePoses(video).then(poses=>{

      if(!poses.length) return;

      const pose = poses[0];

      function P(name){
        return pose.keypoints.find(k=>k.name===name && k.score>0.4);
      }

      const kp = pose.keypoints;

      // FULL BODY
      const pairs = [
        ["left_shoulder","right_shoulder"],
        ["left_shoulder","left_elbow"],
        ["left_elbow","left_wrist"],
        ["right_shoulder","right_elbow"],
        ["right_elbow","right_wrist"],
        ["left_hip","right_hip"],
        ["left_shoulder","left_hip"],
        ["right_shoulder","right_hip"],
        ["left_hip","left_knee"],
        ["left_knee","left_ankle"],
        ["right_hip","right_knee"],
        ["right_knee","right_ankle"]
      ];

      pairs.forEach(([a,b])=>{
        const p1 = P(a);
        const p2 = P(b);
        if(p1 && p2) drawLine(p1,p2);
      });

      kp.forEach(p=>{
        if(p.score>0.4) drawPoint(p);
      });

      // ANGLES
      const elbowR = P("right_elbow");
      const shoulderR = P("right_shoulder");
      const wristR = P("right_wrist");

      const elbowL = P("left_elbow");
      const shoulderL = P("left_shoulder");
      const wristL = P("left_wrist");

      const kneeR = P("right_knee");
      const hipR = P("right_hip");
      const ankleR = P("right_ankle");

      const kneeL = P("left_knee");
      const hipL = P("left_hip");
      const ankleL = P("left_ankle");

      let angleER=0, angleEL=0, angleKR=0, angleKL=0;

      if(shoulderR && elbowR && wristR){
        angleER = buffer("ER", smooth("ER", getAngle(shoulderR, elbowR, wristR)));
      }

      if(shoulderL && elbowL && wristL){
        angleEL = buffer("EL", smooth("EL", getAngle(shoulderL, elbowL, wristL)));
      }

      if(hipR && kneeR && ankleR){
        angleKR = buffer("KR", smooth("KR", getAngle(hipR, kneeR, ankleR)));
      }

      if(hipL && kneeL && ankleL){
        angleKL = buffer("KL", smooth("KL", getAngle(hipL, kneeL, ankleL)));
      }

      // DISPLAY
      ctx.fillStyle="yellow";
      ctx.font="14px monospace";

      if(elbowR) ctx.fillText(angleER.toFixed(1)+"°", canvas.width-elbowR.x, elbowR.y);
      if(elbowL) ctx.fillText(angleEL.toFixed(1)+"°", canvas.width-elbowL.x, elbowL.y);
      if(kneeR) ctx.fillText(angleKR.toFixed(1)+"°", canvas.width-kneeR.x, kneeR.y);
      if(kneeL) ctx.fillText(angleKL.toFixed(1)+"°", canvas.width-kneeL.x, kneeL.y);

      // SAVE DATA
      saveData({
        time: Date.now(),
        elbowR: angleER,
        elbowL: angleEL,
        kneeR: angleKR,
        kneeL: angleKL
      });

      hud.innerHTML = `
        ER: ${angleER.toFixed(1)}°<br>
        EL: ${angleEL.toFixed(1)}°<br>
        KR: ${angleKR.toFixed(1)}°<br>
        KL: ${angleKL.toFixed(1)}°
      `;

    });

    requestAnimationFrame(draw);
  }

  draw();
}

startBtn.onclick = ()=>{
  startBtn.style.display="none";
  main();
}
</script>

</body>
</html>
