<!DOCTYPE html>
<html>
<head>
  <title>GARBHA MOTION ANALYSIS PRO FINAL</title>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.13.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body{margin:0; overflow:hidden; background:black;}
    video, canvas{
      position:absolute;
      width:100%;
      height:100%;
      object-fit:contain;
    }
    video{transform:scaleX(-1);}
    #hud{
      position:fixed;
      top:20px; left:20px;
      color:#00ffff;
      font-family:monospace;
      background:rgba(0,0,0,0.4);
      padding:10px;
      border-radius:10px;
    }
    button{
      position:fixed;
      bottom:20px;
      padding:10px 20px;
      background:#00ffff;
      border:none;
      border-radius:8px;
      cursor:pointer;
      z-index:10;
    }
    #startBtn{left:30%;}
    #pdfBtn{left:50%;}
    #shotBtn{left:70%;}
  </style>
</head>

<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
<div id="hud">Loading...</div>

<button id="startBtn">START</button>
<button id="pdfBtn">EXPORT PDF</button>
<button id="shotBtn">SCREENSHOT</button>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const hud = document.getElementById('hud');
const startBtn = document.getElementById('startBtn');
const pdfBtn = document.getElementById('pdfBtn');
const shotBtn = document.getElementById('shotBtn');

let detector;
let records = [];
let lastFrameImage = null;

// ================= CAMERA =================
async function setupCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{width:1280,height:720,facingMode:"user"}
  });
  video.srcObject = stream;
  return new Promise(r=>{
    video.onloadedmetadata=()=>{ video.play(); r(); }
  });
}

// ================= MATH =================
function getAngle(A,B,C){
  const AB = {x:A.x-B.x, y:A.y-B.y};
  const CB = {x:C.x-B.x, y:C.y-B.y};
  const dot = AB.x*CB.x + AB.y*CB.y;
  const magAB = Math.hypot(AB.x,AB.y);
  const magCB = Math.hypot(CB.x,CB.y);
  return Math.acos(dot/(magAB*magCB)) * 180/Math.PI;
}

// ================= DRAW =================
function drawLine(a,b){
  ctx.beginPath();
  ctx.moveTo(canvas.width-a.x,a.y);
  ctx.lineTo(canvas.width-b.x,b.y);
  ctx.strokeStyle="cyan";
  ctx.lineWidth=3;
  ctx.stroke();
}

function drawPoint(p){
  ctx.beginPath();
  ctx.arc(canvas.width-p.x,p.y,5,0,Math.PI*2);
  ctx.fillStyle="blue";
  ctx.fill();
  ctx.strokeStyle="white";
  ctx.stroke();
}

// ================= SCREENSHOT =================
shotBtn.onclick = ()=>{
  if(!lastFrameImage) return alert("Belum ada frame");

  const a = document.createElement("a");
  a.href = lastFrameImage;
  a.download = "garbha_screenshot.jpg";
  a.click();
};

// ================= PDF =================
pdfBtn.onclick = ()=>{
  if(!lastFrameImage) return alert("Belum ada data");

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.text("GARBHA MOTION REPORT", 10, 10);

  let y = 20;
  records.slice(-10).forEach(r=>{
    doc.text(
      `ER:${r.elbowR.toFixed(1)} EL:${r.elbowL.toFixed(1)} KR:${r.kneeR.toFixed(1)} KL:${r.kneeL.toFixed(1)}`,
      10, y
    );
    y += 6;
  });

  doc.addImage(lastFrameImage, "JPEG", 10, y+5, 180, 100);

  doc.save("garbha_report.pdf");
};

// ================= MAIN =================
async function main(){

  await setupCamera();

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    {modelType:"SinglePose.Lightning"}
  );

  function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.save();
    ctx.scale(-1,1);
    ctx.drawImage(video,-canvas.width,0,canvas.width,canvas.height);
    ctx.restore();

    detector.estimatePoses(video).then(poses=>{

      if(!poses.length) return;
      const pose = poses[0];

      function P(name){
        return pose.keypoints.find(k=>k.name===name && k.score>0.4);
      }

      const kp = pose.keypoints;

      // skeleton
      const pairs = [
        ["left_shoulder","right_shoulder"],
        ["left_shoulder","left_elbow"],
        ["left_elbow","left_wrist"],
        ["right_shoulder","right_elbow"],
        ["right_elbow","right_wrist"],
        ["left_hip","right_hip"],
        ["left_shoulder","left_hip"],
        ["right_shoulder","right_hip"],
        ["left_hip","left_knee"],
        ["left_knee","left_ankle"],
        ["right_hip","right_knee"],
        ["right_knee","right_ankle"]
      ];

      pairs.forEach(([a,b])=>{
        const p1 = P(a);
        const p2 = P(b);
        if(p1 && p2) drawLine(p1,p2);
      });

      kp.forEach(p=>{
        if(p.score>0.4) drawPoint(p);
      });

      // angles
      let ER=0, EL=0, KR=0, KL=0;

      const sR=P("right_shoulder"), eR=P("right_elbow"), wR=P("right_wrist");
      const sL=P("left_shoulder"), eL=P("left_elbow"), wL=P("left_wrist");
      const hR=P("right_hip"), kR=P("right_knee"), aR=P("right_ankle");
      const hL=P("left_hip"), kL=P("left_knee"), aL=P("left_ankle");

      if(sR&&eR&&wR) ER=getAngle(sR,eR,wR);
      if(sL&&eL&&wL) EL=getAngle(sL,eL,wL);
      if(hR&&kR&&aR) KR=getAngle(hR,kR,aR);
      if(hL&&kL&&aL) KL=getAngle(hL,kL,aL);

      ctx.fillStyle="yellow";
      ctx.font="16px monospace";

      if(eR) ctx.fillText(ER.toFixed(1)+"°", canvas.width-eR.x, eR.y);
      if(eL) ctx.fillText(EL.toFixed(1)+"°", canvas.width-eL.x, eL.y);
      if(kR) ctx.fillText(KR.toFixed(1)+"°", canvas.width-kR.x, kR.y);
      if(kL) ctx.fillText(KL.toFixed(1)+"°", canvas.width-kL.x, kL.y);

      records.push({
        elbowR:ER, elbowL:EL, kneeR:KR, kneeL:KL
      });

      // 🔥 simpan frame terakhir (INI KUNCI FIX SCREENSHOT)
      lastFrameImage = canvas.toDataURL("image/jpeg", 0.9);

      hud.innerHTML = `
        ER:${ER.toFixed(1)}°<br>
        EL:${EL.toFixed(1)}°<br>
        KR:${KR.toFixed(1)}°<br>
        KL:${KL.toFixed(1)}°
      `;

    });

    requestAnimationFrame(draw);
  }

  draw();
}

startBtn.onclick = ()=>{
  startBtn.style.display="none";
  main();
};
</script>

</body>
</html>
