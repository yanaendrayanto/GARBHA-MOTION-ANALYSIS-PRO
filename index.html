<!DOCTYPE html>
<html>
<head>
  <title>GARBHA MOTION ANALYSIS PRO MAX</title>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.13.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf"></script>

  <style>
    body{margin:0; overflow:hidden; background:black;}
    video, canvas{
      position:absolute;
      width:100%;
      height:100%;
      object-fit:contain;
    }
    video{transform:scaleX(-1);}
    #hud{
      position:fixed;
      top:20px; left:20px;
      color:#00ffff;
      font-family:monospace;
      background:rgba(0,0,0,0.4);
      padding:10px;
      border-radius:10px;
    }
    button{
      position:fixed;
      bottom:20px;
      padding:10px 20px;
      background:#00ffff;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }
    #startBtn{left:35%;}
    #pdfBtn{left:50%;}
    #shotBtn{left:65%;}
  </style>
</head>

<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
<div id="hud">Loading...</div>

<button id="startBtn">START</button>
<button id="pdfBtn">EXPORT PDF</button>
<button id="shotBtn">SCREENSHOT</button>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');

const startBtn = document.getElementById('startBtn');
const pdfBtn = document.getElementById('pdfBtn');
const shotBtn = document.getElementById('shotBtn');

let detector;
let records = [];

// ================= CAMERA =================
async function setupCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{width:1280,height:720,facingMode:"user"}
  });
  video.srcObject = stream;
  return new Promise(r=>{
    video.onloadedmetadata=()=>{ video.play(); r(); }
  });
}

// ================= MATH =================
function getAngle(A,B,C){
  const AB = {x:A.x-B.x, y:A.y-B.y};
  const CB = {x:C.x-B.x, y:C.y-B.y};
  const dot = AB.x*CB.x + AB.y*CB.y;
  const magAB = Math.hypot(AB.x,AB.y);
  const magCB = Math.hypot(CB.x,CB.y);
  return Math.acos(dot/(magAB*magCB)) * 180/Math.PI;
}

// ================= SCREENSHOT =================
shotBtn.onclick = ()=>{
  const img = canvas.toDataURL("image/jpeg");
  const a = document.createElement("a");
  a.href = img;
  a.download = "garbha_screenshot.jpg";
  a.click();
};

// ================= PDF EXPORT =================
pdfBtn.onclick = ()=>{
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.setFontSize(12);
  doc.text("GARBHA MOTION ANALYSIS REPORT", 10, 10);

  let y = 20;

  records.slice(-20).forEach(r=>{
    doc.text(
      `t:${r.time} | ER:${r.elbowR.toFixed(1)} EL:${r.elbowL.toFixed(1)} KR:${r.kneeR.toFixed(1)} KL:${r.kneeL.toFixed(1)}`,
      10, y
    );
    y += 6;
  });

  // tambahkan gambar terakhir
  const img = canvas.toDataURL("image/jpeg", 0.8);
  doc.addImage(img, "JPEG", 10, y+5, 180, 100);

  doc.save("garbha_report.pdf");
};

// ================= MAIN =================
async function main(){

  await setupCamera();

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    {modelType:"SinglePose.Lightning"}
  );

  function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.save();
    ctx.scale(-1,1);
    ctx.drawImage(video,-canvas.width,0,canvas.width,canvas.height);
    ctx.restore();

    detector.estimatePoses(video).then(poses=>{

      if(!poses.length) return;
      const pose = poses[0];

      function P(name){
        return pose.keypoints.find(k=>k.name===name && k.score>0.4);
      }

      const shoulderR = P("right_shoulder");
      const elbowR = P("right_elbow");
      const wristR = P("right_wrist");

      const shoulderL = P("left_shoulder");
      const elbowL = P("left_elbow");
      const wristL = P("left_wrist");

      const hipR = P("right_hip");
      const kneeR = P("right_knee");
      const ankleR = P("right_ankle");

      const hipL = P("left_hip");
      const kneeL = P("left_knee");
      const ankleL = P("left_ankle");

      let ER=0, EL=0, KR=0, KL=0;

      if(shoulderR && elbowR && wristR){
        ER = getAngle(shoulderR, elbowR, wristR);
      }
      if(shoulderL && elbowL && wristL){
        EL = getAngle(shoulderL, elbowL, wristL);
      }
      if(hipR && kneeR && ankleR){
        KR = getAngle(hipR, kneeR, ankleR);
      }
      if(hipL && kneeL && ankleL){
        KL = getAngle(hipL, kneeL, ankleL);
      }

      records.push({
        time: Date.now(),
        elbowR: ER,
        elbowL: EL,
        kneeR: KR,
        kneeL: KL
      });

      hud.innerHTML = `
        ER:${ER.toFixed(1)}°<br>
        EL:${EL.toFixed(1)}°<br>
        KR:${KR.toFixed(1)}°<br>
        KL:${KL.toFixed(1)}°
      `;

    });

    requestAnimationFrame(draw);
  }

  draw();
}

startBtn.onclick = ()=>{
  startBtn.style.display="none";
  main();
};
</script>

</body>
</html>
