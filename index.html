<!DOCTYPE html>
<html>
<head>
  <title>GARBHA MOTION ANALYSIS PRO</title>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.13.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

  <style>
    body{margin:0; overflow:hidden; background:black;}
    video, canvas{
      position:absolute;
      width:100%;
      height:100%;
      object-fit:contain;
    }
    video{transform:scaleX(-1);}
    #hud{
      position:fixed;
      top:20px; left:20px;
      color:#00ffff;
      font-family:monospace;
      background:rgba(0,0,0,0.4);
      padding:10px;
      border-radius:10px;
    }
    button{
      position:fixed;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      padding:10px 20px;
      background:#00ffff;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
<div id="hud">Loading...</div>
<button id="startBtn">START</button>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
const startBtn = document.getElementById('startBtn');

let detector;

// ================= CAMERA =================
async function setupCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{width:1280,height:720,facingMode:"user"}
  });
  video.srcObject = stream;
  return new Promise(r=>{
    video.onloadedmetadata=()=>{
      video.play();
      r();
    }
  });
}

// ================= MATH =================
function getDistance(a,b){
  return Math.hypot(a.x-b.x, a.y-b.y);
}

function getAngle(A,B,C){
  const AB = {x:A.x-B.x, y:A.y-B.y};
  const CB = {x:C.x-B.x, y:C.y-B.y};

  const dot = AB.x*CB.x + AB.y*CB.y;
  const magAB = Math.hypot(AB.x,AB.y);
  const magCB = Math.hypot(CB.x,CB.y);

  return Math.acos(dot/(magAB*magCB)) * 180/Math.PI;
}

// ================= DRAW =================
function drawLine(a,b){
  ctx.beginPath();
  ctx.moveTo(canvas.width-a.x,a.y);
  ctx.lineTo(canvas.width-b.x,b.y);
  ctx.strokeStyle="cyan"; // 🔵 biru
  ctx.lineWidth=3;
  ctx.stroke();
}

function drawPoint(p){
  ctx.beginPath();
  ctx.arc(canvas.width-p.x,p.y,5,0,Math.PI*2);
  ctx.fillStyle="blue";
  ctx.fill();

  ctx.strokeStyle="white";
  ctx.lineWidth=1;
  ctx.stroke();
}

// ================= MAIN =================
async function main(){

  await setupCamera();

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    {modelType:"SinglePose.Lightning"}
  );

  function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.save();
    ctx.scale(-1,1);
    ctx.drawImage(video,-canvas.width,0,canvas.width,canvas.height);
    ctx.restore();

    detector.estimatePoses(video).then(poses=>{

      if(!poses.length) return;

      const pose = poses[0];

      function P(name){
        return pose.keypoints.find(k=>k.name===name && k.score>0.4);
      }

      // ================= POINTS =================
      const points = pose.keypoints.filter(k=>k.score>0.4);

      // ================= SKELETON =================
      const shoulderR = P("right_shoulder");
      const elbowR = P("right_elbow");
      const wristR = P("right_wrist");

      const shoulderL = P("left_shoulder");
      const elbowL = P("left_elbow");
      const wristL = P("left_wrist");

      const hipR = P("right_hip");
      const kneeR = P("right_knee");
      const ankleR = P("right_ankle");

      const hipL = P("left_hip");
      const kneeL = P("left_knee");
      const ankleL = P("left_ankle");

      // ================= DRAW LINES =================
      if(shoulderR && elbowR) drawLine(shoulderR, elbowR);
      if(elbowR && wristR) drawLine(elbowR, wristR);

      if(shoulderL && elbowL) drawLine(shoulderL, elbowL);
      if(elbowL && wristL) drawLine(elbowL, wristL);

      if(hipR && kneeR) drawLine(hipR, kneeR);
      if(kneeR && ankleR) drawLine(kneeR, ankleR);

      if(hipL && kneeL) drawLine(hipL, kneeL);
      if(kneeL && ankleL) drawLine(kneeL, ankleL);

      // ================= DRAW ALL POINTS =================
      points.forEach(p=>{
        drawPoint(p);
      });

      // ================= ANGLE =================
      let info = "";

      if(shoulderR && elbowR && wristR){
        const angle = getAngle(shoulderR, elbowR, wristR);
        ctx.fillStyle="yellow";
        ctx.font="16px monospace";
        ctx.fillText(angle.toFixed(1)+"°", canvas.width-elbowR.x, elbowR.y);
        info += "Right Elbow: "+angle.toFixed(1)+"°<br>";
      }

      if(hipR && kneeR && ankleR){
        const angle = getAngle(hipR, kneeR, ankleR);
        ctx.fillText(angle.toFixed(1)+"°", canvas.width-kneeR.x, kneeR.y);
        info += "Right Knee: "+angle.toFixed(1)+"°<br>";
      }

      // ================= CM ESTIMATION =================
      if(shoulderL && shoulderR){
        const pixel = getDistance(shoulderL, shoulderR);
        const scale = 40 / pixel;

        if(elbowR && wristR){
          const dist = getDistance(elbowR, wristR);
          const cm = dist * scale;

          ctx.fillStyle="cyan";
          ctx.fillText(cm.toFixed(1)+" cm", canvas.width-wristR.x, wristR.y+15);
          info += "Forearm: "+cm.toFixed(1)+" cm<br>";
        }
      }

      hud.innerHTML = info;

    });

    requestAnimationFrame(draw);
  }

  draw();
}

startBtn.onclick = ()=>{
  startBtn.style.display="none";
  main();
}
</script>

</body>
</html>
