<!DOCTYPE html>
<html>
<head>
  <title>GARBHA MOTION ANALYSIS PRO+</title>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.13.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

  <style>
    body{margin:0; overflow:hidden; background:black;}
    video, canvas{
      position:absolute;
      width:100%;
      height:100%;
      object-fit:contain;
    }
    video{transform:scaleX(-1);}
    #hud{
      position:fixed;
      top:20px; left:20px;
      color:#00ffff;
      font-family:monospace;
      background:rgba(0,0,0,0.4);
      padding:10px;
      border-radius:10px;
    }
    button{
      position:fixed;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      padding:10px 20px;
      background:#00ffff;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
<div id="hud">Loading...</div>
<button id="startBtn">START</button>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
const startBtn = document.getElementById('startBtn');

let detector;

// ================= STABILIZER =================
let smoothData = {};

function smooth(name, value){
  if(!smoothData[name]) smoothData[name] = value;
  smoothData[name] = smoothData[name] * 0.7 + value * 0.3;
  return smoothData[name];
}

// ================= CAMERA =================
async function setupCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{width:1280,height:720,facingMode:"user"}
  });
  video.srcObject = stream;
  return new Promise(r=>{
    video.onloadedmetadata=()=>{
      video.play();
      r();
    }
  });
}

// ================= MATH =================
function getDistance(a,b){
  return Math.hypot(a.x-b.x, a.y-b.y);
}

function getAngle(A,B,C){
  const AB = {x:A.x-B.x, y:A.y-B.y};
  const CB = {x:C.x-B.x, y:C.y-B.y};

  const dot = AB.x*CB.x + AB.y*CB.y;
  const magAB = Math.hypot(AB.x,AB.y);
  const magCB = Math.hypot(CB.x,CB.y);

  return Math.acos(dot/(magAB*magCB)) * 180/Math.PI;
}

// ================= DRAW =================
function drawLine(a,b){
  ctx.beginPath();
  ctx.moveTo(canvas.width-a.x,a.y);
  ctx.lineTo(canvas.width-b.x,b.y);
  ctx.strokeStyle="cyan";
  ctx.lineWidth=3;
  ctx.stroke();
}

function drawPoint(p){
  ctx.beginPath();
  ctx.arc(canvas.width-p.x,p.y,5,0,Math.PI*2);
  ctx.fillStyle="blue";
  ctx.fill();
  ctx.strokeStyle="white";
  ctx.stroke();
}

// ================= MAIN =================
async function main(){

  await setupCamera();

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    {modelType:"SinglePose.Lightning"}
  );

  function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.save();
    ctx.scale(-1,1);
    ctx.drawImage(video,-canvas.width,0,canvas.width,canvas.height);
    ctx.restore();

    detector.estimatePoses(video).then(poses=>{

      if(!poses.length) return;

      const pose = poses[0];

      function P(name){
        return pose.keypoints.find(k=>k.name===name && k.score>0.4);
      }

      const kp = pose.keypoints;

      // ================= FULL BODY CONNECTION =================
      const pairs = [
        ["nose","left_eye"],["nose","right_eye"],
        ["left_shoulder","right_shoulder"],
        ["left_shoulder","left_elbow"],
        ["left_elbow","left_wrist"],
        ["right_shoulder","right_elbow"],
        ["right_elbow","right_wrist"],
        ["left_shoulder","left_hip"],
        ["right_shoulder","right_hip"],
        ["left_hip","right_hip"],
        ["left_hip","left_knee"],
        ["left_knee","left_ankle"],
        ["right_hip","right_knee"],
        ["right_knee","right_ankle"]
      ];

      pairs.forEach(([a,b])=>{
        const p1 = P(a);
        const p2 = P(b);
        if(p1 && p2) drawLine(p1,p2);
      });

      // ================= DRAW POINTS =================
      kp.forEach(p=>{
        if(p.score>0.4) drawPoint(p);
      });

      // ================= ANGLE STABLE =================
      let info = "";

      const shoulder = P("right_shoulder");
      const elbow = P("right_elbow");
      const wrist = P("right_wrist");

      if(shoulder && elbow && wrist){
        let angle = getAngle(shoulder, elbow, wrist);
        angle = smooth("elbowAngle", angle);

        ctx.fillStyle="yellow";
        ctx.font="16px monospace";
        ctx.fillText(angle.toFixed(1)+"°", canvas.width-elbow.x, elbow.y);

        info += "Elbow: "+angle.toFixed(1)+"°<br>";
      }

      // ================= CM STABLE =================
      const sL = P("left_shoulder");
      const sR = P("right_shoulder");

      if(sL && sR && elbow && wrist){
        let pixel = getDistance(sL, sR);
        pixel = smooth("shoulderWidth", pixel);

        const scale = 40 / pixel;

        let dist = getDistance(elbow, wrist);
        dist = smooth("forearmDist", dist);

        const cm = dist * scale;

        ctx.fillStyle="cyan";
        ctx.fillText(cm.toFixed(1)+" cm", canvas.width-wrist.x, wrist.y+15);

        info += "Forearm: "+cm.toFixed(1)+" cm<br>";
      }

      hud.innerHTML = info;

    });

    requestAnimationFrame(draw);
  }

  draw();
}

startBtn.onclick = ()=>{
  startBtn.style.display="none";
  main();
}
</script>

</body>
</html>
