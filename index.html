<!DOCTYPE html>
<html>
<head>
  <title>GARBHA MOTION ANALYSIS PRO FINAL</title>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.13.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body{margin:0; overflow:hidden; background:black;}
    video, canvas{
      position:absolute;
      width:100%;
      height:100%;
      object-fit:contain;
    }
    video{transform:scaleX(-1);}
    button{
      position:fixed;
      bottom:20px;
      padding:10px 20px;
      background:#00ffff;
      border:none;
      border-radius:8px;
      cursor:pointer;
      z-index:10;
    }
    #startBtn{left:25%;}
    #pdfBtn{left:45%;}
    #shotBtn{left:65%;}
  </style>
</head>

<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<button id="startBtn">START</button>
<button id="pdfBtn">EXPORT PDF</button>
<button id="shotBtn">SCREENSHOT</button>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const startBtn = document.getElementById('startBtn');
const pdfBtn = document.getElementById('pdfBtn');
const shotBtn = document.getElementById('shotBtn');

let detector;
let records = [];
let lastFrameImage = null;

// 🔥 ANTI 0 DATA
let lastValid = {
  handR:0, handL:0,
  legR:0, legL:0,
  angleER:0, angleEL:0,
  angleKR:0, angleKL:0
};

// CAMERA
async function setupCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{width:1280,height:720,facingMode:"user"}
  });
  video.srcObject = stream;
  return new Promise(r=>{
    video.onloadedmetadata=()=>{ video.play(); r(); }
  });
}

// MATH
function getAngle(A,B,C){
  const AB = {x:A.x-B.x, y:A.y-B.y};
  const CB = {x:C.x-B.x, y:C.y-B.y};
  const dot = AB.x*CB.x + AB.y*CB.y;
  const magAB = Math.hypot(AB.x,AB.y);
  const magCB = Math.hypot(CB.x,CB.y);
  return Math.acos(dot/(magAB*magCB)) * 180/Math.PI;
}

function getDistance(a,b){
  return Math.hypot(a.x-b.x, a.y-b.y);
}

// DRAW
function drawLine(a,b){
  ctx.beginPath();
  ctx.moveTo(canvas.width-a.x,a.y);
  ctx.lineTo(canvas.width-b.x,b.y);
  ctx.strokeStyle="cyan";
  ctx.lineWidth=3;
  ctx.stroke();
}

function drawPoint(p){
  ctx.beginPath();
  ctx.arc(canvas.width-p.x,p.y,5,0,Math.PI*2);
  ctx.fillStyle="blue";
  ctx.fill();
  ctx.strokeStyle="white";
  ctx.stroke();
}

// SCREENSHOT
shotBtn.onclick = ()=>{
  if(!lastFrameImage) return alert("Belum ada frame");
  const a = document.createElement("a");
  a.href = lastFrameImage;
  a.download = "garbha_screenshot.jpg";
  a.click();
};

// PDF FIX
pdfBtn.onclick = ()=>{
  if(!lastFrameImage) return alert("Belum ada data");

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.text("GARBHA MOTION REPORT", 10, 10);

  let y = 20;

  records.slice(-10).forEach(r=>{
    doc.text(`Tangan R: ${r.handR.toFixed(1)} cm | Tangan L: ${r.handL.toFixed(1)} cm`,10,y); y+=6;
    doc.text(`Siku R: ${r.angleER.toFixed(1)}° | Siku L: ${r.angleEL.toFixed(1)}°`,10,y); y+=6;
    doc.text(`Kaki R: ${r.legR.toFixed(1)} cm | Kaki L: ${r.legL.toFixed(1)} cm`,10,y); y+=6;
    doc.text(`Lutut R: ${r.angleKR.toFixed(1)}° | Lutut L: ${r.angleKL.toFixed(1)}°`,10,y); y+=10;
  });

  // 🔥 posisi gambar FIX
  doc.addImage(lastFrameImage, "JPEG", 10, y, 180, 100);

  doc.save("garbha_report.pdf");
};

// MAIN
async function main(){

  await setupCamera();

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    {modelType:"SinglePose.Lightning"}
  );

  function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.save();
    ctx.scale(-1,1);
    ctx.drawImage(video,-canvas.width,0,canvas.width,canvas.height);
    ctx.restore();

    detector.estimatePoses(video).then(poses=>{

      if(!poses.length) return;
      const pose = poses[0];

      function P(name){
        return pose.keypoints.find(k=>k.name===name && k.score>0.4);
      }

      const kp = pose.keypoints;

      // skeleton
      const pairs = [
        ["left_shoulder","right_shoulder"],
        ["left_shoulder","left_elbow"],
        ["left_elbow","left_wrist"],
        ["right_shoulder","right_elbow"],
        ["right_elbow","right_wrist"],
        ["left_hip","right_hip"],
        ["left_shoulder","left_hip"],
        ["right_shoulder","right_hip"],
        ["left_hip","left_knee"],
        ["left_knee","left_ankle"],
        ["right_hip","right_knee"],
        ["right_knee","right_ankle"]
      ];

      pairs.forEach(([a,b])=>{
        const p1 = P(a);
        const p2 = P(b);
        if(p1 && p2) drawLine(p1,p2);
      });

      kp.forEach(p=>{
        if(p.score>0.4) drawPoint(p);
      });

      const sR=P("right_shoulder"), eR=P("right_elbow"), wR=P("right_wrist");
      const sL=P("left_shoulder"), eL=P("left_elbow"), wL=P("left_wrist");
      const hR=P("right_hip"), kR=P("right_knee"), aR=P("right_ankle");
      const hL=P("left_hip"), kL=P("left_knee"), aL=P("left_ankle");

      let scale = 1;
      if(sL && sR){
        scale = 40 / getDistance(sL, sR);
      }

      let handR = eR&&wR ? getDistance(eR,wR)*scale : 0;
      let handL = eL&&wL ? getDistance(eL,wL)*scale : 0;
      let legR = kR&&aR ? getDistance(kR,aR)*scale : 0;
      let legL = kL&&aL ? getDistance(kL,aL)*scale : 0;

      let angleER = sR&&eR&&wR ? getAngle(sR,eR,wR) : 0;
      let angleEL = sL&&eL&&wL ? getAngle(sL,eL,wL) : 0;
      let angleKR = hR&&kR&&aR ? getAngle(hR,kR,aR) : 0;
      let angleKL = hL&&kL&&aL ? getAngle(hL,kL,aL) : 0;

      // stabil
      if(handR>0) lastValid.handR = handR;
      if(handL>0) lastValid.handL = handL;
      if(legR>0) lastValid.legR = legR;
      if(legL>0) lastValid.legL = legL;

      if(angleER>0) lastValid.angleER = angleER;
      if(angleEL>0) lastValid.angleEL = angleEL;
      if(angleKR>0) lastValid.angleKR = angleKR;
      if(angleKL>0) lastValid.angleKL = angleKL;

      handR = lastValid.handR;
      handL = lastValid.handL;
      legR = lastValid.legR;
      legL = lastValid.legL;

      angleER = lastValid.angleER;
      angleEL = lastValid.angleEL;
      angleKR = lastValid.angleKR;
      angleKL = lastValid.angleKL;

      // 🔥 LABEL SKELETON BALIK
      ctx.fillStyle="yellow";
      ctx.font="12px monospace";

      if(eR) ctx.fillText(angleER.toFixed(1)+"°", canvas.width-eR.x, eR.y-10);
      if(eL) ctx.fillText(angleEL.toFixed(1)+"°", canvas.width-eL.x, eL.y-10);
      if(kR) ctx.fillText(angleKR.toFixed(1)+"°", canvas.width-kR.x, kR.y-10);
      if(kL) ctx.fillText(angleKL.toFixed(1)+"°", canvas.width-kL.x, kL.y-10);

      if(wR) ctx.fillText(handR.toFixed(1)+"cm", canvas.width-wR.x, wR.y+15);
      if(wL) ctx.fillText(handL.toFixed(1)+"cm", canvas.width-wL.x, wL.y+15);

      // 🔥 HUD BALIK
      ctx.fillStyle="white";
      ctx.font="14px monospace";

      let yHUD = 20;
      function HUD(t){ ctx.fillText(t,20,yHUD); yHUD+=18; }

      HUD("=== GARBHA ANALYSIS ===");
      HUD(`Tangan Kanan: ${handR.toFixed(1)} cm`);
      HUD(`Tangan Kiri : ${handL.toFixed(1)} cm`);
      HUD(`Siku Kanan: ${angleER.toFixed(1)}°`);
      HUD(`Siku Kiri : ${angleEL.toFixed(1)}°`);
      HUD(`Kaki Kanan: ${legR.toFixed(1)} cm`);
      HUD(`Kaki Kiri : ${legL.toFixed(1)} cm`);
      HUD(`Lutut Kanan: ${angleKR.toFixed(1)}°`);
      HUD(`Lutut Kiri : ${angleKL.toFixed(1)}°`);

      records.push({handR,handL,legR,legL,angleER,angleEL,angleKR,angleKL});
      lastFrameImage = canvas.toDataURL("image/jpeg",0.9);

    });

    requestAnimationFrame(draw);
  }

  draw();
}

startBtn.onclick = ()=>{
  startBtn.style.display="none";
  main();
};
</script>

</body>
</html>
